<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ToolTalk – Zalo / Messenger Translation Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <!-- Firebase Realtime Database -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- User Setup Modal (Shown first time or when changing name) -->
    <div id="userModal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-avatar-preview" id="avatarPreview">?</div>
            <h2>Chào mừng đến ToolTalk</h2>
            <p>Hệ thống Chat AI hỗ trợ phiên dịch tự động</p>

            <div class="input-group">
                <label>Tên hiển thị của bạn</label>
                <input type="text" id="userNameInput" placeholder="VD: Hoài Nam, John Doe..." autocomplete="off">
            </div>

            <div class="input-group">
                <label>Ngôn ngữ chính</label>
                <select id="userLangSelect" class="lang-select">
                    <option value="vi">🇻🇳 Tiếng Việt</option>
                    <option value="en">🇺🇸 English</option>
                    <option value="ja">🇯🇵 日本語</option>
                    <option value="ko">🇰🇷 한국어</option>
                    <option value="zh">🇨🇳 中文</option>
                    <option value="fr">🇫🇷 Français</option>
                    <option value="de">🇩🇪 Deutsch</option>
                    <option value="es">🇪🇸 Español</option>
                    <option value="th">🇹🇭 ภาษาไทย</option>
                    <option value="ru">🇷🇺 Русский</option>
                </select>
            </div>

            <button id="saveUserBtn" class="btn-primary">Vào ứng dụng</button>
        </div>
    </div>

    <!-- Main Layout: Sidebar + Chat Area -->
    <div id="app" class="app hidden">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="user-profile">
                    <div class="avatar" id="myAvatar">H</div>
                    <div class="user-info">
                        <div class="user-name" id="myNameDisplay">Hoài Nam</div>
                        <div class="user-lang" id="myLangDisplay">Tiếng Việt</div>
                    </div>
                </div>
                <button id="editProfileBtn" class="btn-icon-small" title="Đổi tên/Ngôn ngữ">⚙️</button>
            </div>

            <div class="sidebar-search">
                <input type="text" id="joinRoomInput" placeholder="Nhập mã phòng để tham gia...">
                <button id="joinRoomBtn" title="Vào phòng này">+</button>
            </div>

            <div class="room-list-header">
                <span>PHÒNG GẦN ĐÂY</span>
            </div>

            <ul class="room-list" id="roomList">
                <!-- Room items generated by JS -->
            </ul>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main hidden" id="chatMain">
            <!-- Header -->
            <header class="chat-header">
                <div class="header-left">
                    <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
                    <div class="room-info">
                        <div class="room-avatar">#</div>
                        <div>
                            <h2 id="currentRoomName">Tên phòng</h2>
                            <div class="room-meta">Mã: <span id="currentRoomId">1234</span> <button id="copyRoomIdBtn"
                                    class="copy-tiny">📋 Copy</button></div>
                        </div>
                    </div>
                </div>
                <div class="header-right">
                    <span class="online-badge">● Live</span>
                </div>
            </header>

            <!-- Messages -->
            <div class="chat-messages" id="chatMessages">
                <!-- Messages populated here -->
            </div>

            <!-- Input Area -->
            <footer class="chat-input-area">
                <button id="micBtn" class="mic-btn" title="Giọng nói (Voice Typing)">
                    <svg class="mic-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
                        <line x1="12" y1="19" x2="12" y2="23" />
                        <line x1="8" y1="23" x2="16" y2="23" />
                    </svg>
                    <div class="pulse-ring"></div>
                </button>
                <div class="input-wrapper">
                    <input type="text" id="chatInput" placeholder="Nhập tin nhắn để gửi cho phòng..."
                        autocomplete="off">
                    <div id="micStatusIndicator" class="mic-status hidden">Đang nghe...</div>
                </div>
                <button id="sendBtn" class="send-btn" title="Gửi (Enter)">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="22" y1="2" x2="11" y2="13" />
                        <polygon points="22 2 15 22 11 13 2 9 22 2" />
                    </svg>
                </button>
            </footer>
        </main>

        <!-- Empty State (When no room is selected) -->
        <div class="empty-state" id="emptyState">
            <div class="empty-icon">💬</div>
            <h2>ToolTalk Messenger</h2>
            <p>Chọn một phòng ở bên trái hoặc tạo/nhập mã phòng mới để bắt đầu chat.</p>
        </div>
    </div>

    <!-- Mobile Sidebar Overlay Darken -->
    <div id="sidebarOverlay" class="sidebar-overlay hidden"></div>

    <script src="app.js"></script>
</body>

</html>
